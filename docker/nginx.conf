# Scriptor demo image — nginx front config.
#
# Front-controller pattern: anything that isn't a static asset under the
# webroot routes through public/index.php. The webroot is /public/ — so
# data/, boot/, vendor/, bin/, themes/ (PHP half), editor/, .git etc.
# are physically out of reach. No directory-deny rules necessary;
# they're kept here as defence-in-depth (dotfile rule + "no other .php
# is executable").

# The official nginx:alpine image runs as the `nginx` user — not
# `www-data` like the php-fpm image. They're two separate containers,
# so the user mismatch is fine: nginx only needs read access to the
# shared volume, and the volume's files are world-readable (0644/0755
# defaults from the Scriptor image).
user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 16M;
    server_tokens off;

    access_log /dev/stdout;

    # Security headers shared by every location. nginx's add_header is
    # shadowed when an inner location declares its own add_header — so
    # locations that need a per-location header (e.g. /uploads/ for
    # Cache-Control) repeat the security set below.
    # `worker-src 'self' blob:` is needed by FilePond, which spawns
    # off-thread workers from `blob:`-URLs for client-side image
    # processing (resize, EXIF strip). Without it, browsers fall back
    # to `script-src`, which doesn't allow `blob:` — uploads still
    # work, but the worker creation throws on every file pick.
    map $sent_http_content_type $scriptor_security_csp {
        default "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob:; font-src 'self' https://cdn.jsdelivr.net data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'";
    }

    server {
        listen 80;
        server_name _;
        root /var/www/scriptor/public;
        index index.php;

        add_header Content-Security-Policy   $scriptor_security_csp always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), camera=(), microphone=(), payment=(), interest-cohort=()" always;

        # Dotfiles (.git lives outside the webroot anyway, but .htaccess
        # is here, .env would be if it existed).
        location ~ /\.(?!well-known) {
            deny all;
            return 404;
        }

        # User uploads — long-cache; their URLs are content-addressed
        # (path includes itemId/fieldId/<safe-filename>).
        location /uploads/ {
            expires 30d;
            add_header Cache-Control          "public, immutable" always;
            # Re-declare security headers because the parent's
            # add_header set is shadowed when this block has its own.
            add_header Content-Security-Policy $scriptor_security_csp always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options        "SAMEORIGIN" always;
            add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy     "geolocation=(), camera=(), microphone=(), payment=(), interest-cohort=()" always;
        }

        # Front controller. We deliberately leave `$uri/` OUT of the
        # try_files list — public/index.php handles admin-path
        # delegation in PHP. Letting nginx resolve `/editor/` to a
        # directory index would bypass the front controller.
        location / {
            try_files $uri /index.php?$query_string;
        }

        location ~ ^/index\.php(/|$) {
            fastcgi_pass scriptor:9000;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT   $realpath_root;
            internal;
        }

        # No other .php is executable. Nothing under public/ is PHP
        # anyway (besides index.php), but defence-in-depth in case a
        # theme accidentally puts a .php into public/themes/.
        location ~ \.php$ {
            return 404;
        }
    }
}
