# Scriptor demo image — nginx front config.
#
# Front-controller pattern: anything that isn't a static asset under the
# webroot routes through public/index.php. The webroot is /public/ — so
# data/, boot/, vendor/, bin/, themes/ (PHP half), editor/, .git etc.
# are physically out of reach. No directory-deny rules necessary;
# they're kept here as defence-in-depth (dotfile rule + "no other .php
# is executable").

# The official nginx:alpine image runs as the `nginx` user — not
# `www-data` like the php-fpm image. They're two separate containers,
# so the user mismatch is fine: nginx only needs read access to the
# shared volume, and the volume's files are world-readable (0644/0755
# defaults from the Scriptor image).
user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 16M;

    access_log /dev/stdout;

    server {
        listen 80;
        server_name _;
        root /var/www/scriptor/public;
        index index.php;

        # Dotfiles (.git lives outside the webroot anyway, but .htaccess
        # is here, .env would be if it existed).
        location ~ /\.(?!well-known) {
            deny all;
            return 404;
        }

        # User uploads — long-cache; their URLs are content-addressed
        # (path includes itemId/fieldId/<safe-filename>).
        location /uploads/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Front controller. We deliberately leave `$uri/` OUT of the
        # try_files list — public/index.php handles admin-path
        # delegation in PHP. Letting nginx resolve `/editor/` to a
        # directory index would bypass the front controller.
        location / {
            try_files $uri /index.php?$query_string;
        }

        location ~ ^/index\.php(/|$) {
            fastcgi_pass scriptor:9000;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT   $realpath_root;
            internal;
        }

        # No other .php is executable. Nothing under public/ is PHP
        # anyway (besides index.php), but defence-in-depth in case a
        # theme accidentally puts a .php into public/themes/.
        location ~ \.php$ {
            return 404;
        }
    }
}
