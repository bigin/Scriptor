# Scriptor demo image — nginx front config.
#
# Front-controller pattern: anything that isn't a static asset under the
# webroot routes through index.php. Uploads under /data/uploads-2.0/ are
# served directly. Internal data (the SQLite DB, the cache directory,
# the logs and backups dirs) is blocked at the URL layer — defence in
# depth on top of the fact that `data/` lives outside the webroot anyway.

# The official nginx:alpine image runs as the `nginx` user — not
# `www-data` like the php-fpm image. They're two separate containers,
# so the user mismatch is fine: nginx only needs read access to the
# shared volume, and the volume's files are world-readable (0644/0755
# defaults from the Scriptor image).
user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 16M;

    access_log /dev/stdout;

    server {
        listen 80;
        server_name _;
        root /var/www/scriptor;
        index index.php;

        # Public uploads — served by nginx directly.
        location /data/uploads-2.0/ {
            alias /var/www/scriptor/data/uploads-2.0/;
            try_files $uri =404;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Block everything else under data/ at the URL layer.
        location ~ ^/data/ {
            deny all;
            return 404;
        }

        # Block the imanager/ leftover (1.x embedded lib, not present in
        # 2.0 demos but harmless to refuse).
        location ~ ^/imanager/ {
            deny all;
            return 404;
        }

        # Front controller. We deliberately leave `$uri/` OUT of the
        # try_files list — Scriptor's `index.php` at the repo root
        # handles `/editor/*` internally via PHP delegation. If we let
        # nginx resolve `/editor/` to `editor/index.php` (via the
        # `index` directive), the request bypasses the front
        # controller and hits the editor's index directly, which
        # depends on globals the root index.php sets up.
        location / {
            try_files $uri /index.php?$query_string;
        }

        location ~ ^/index\.php(/|$) {
            fastcgi_pass scriptor:9000;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT   $realpath_root;
            internal;
        }

        # No other .php is ever executed directly.
        location ~ \.php$ {
            return 404;
        }
    }
}
